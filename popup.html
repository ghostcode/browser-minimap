<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browser Minimap</title>
  <style>
    body {
      width: 240px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #e0e0e0;
      background: #1e1e1e;
    }
    h1 {
      margin: 0 0 12px 0;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
    }
    p {
      margin: 0 0 12px 0;
      line-height: 1.4;
    }
    .shortcut {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      background: #333;
      font-family: monospace;
      font-size: 12px;
    }
    button {
      width: 100%;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background: #42a5f5;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    button:hover {
      background: #1e88e5;
    }
  </style>
</head>
<body>
  <h1>Browser Minimap</h1>
  <p>拖动右侧 minimap 中的蓝色视口框来快速滚动页面。</p>
  <p>点击 <span class="shortcut">☰</span> 或 <span class="shortcut">✕</span> 按钮可显示/隐藏 minimap。</p>
  <button id="toggle-btn">在当前页面切换 Minimap</button>
  <script src="popup.js"></script>
</body>
</html>
